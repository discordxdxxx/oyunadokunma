<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Mini Discord</title>

<style>
body {
  margin: 0;
  display: flex;
  height: 100vh;
  font-family: Arial;
  background: #36393f;
  color: white;
}

.sidebar {
  width: 250px;
  background: #2f3136;
  padding: 15px;
}

.chat {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.topbar {
  background: #202225;
  padding: 15px;
  font-weight: bold;
}

.messages {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
}

.message {
  background: #40444b;
  padding: 8px;
  margin: 5px 0;
  border-radius: 5px;
  animation: fadeIn 0.3s ease;
}

input {
  padding: 10px;
  border: none;
  outline: none;
  width: 100%;
}

button {
  margin-top: 5px;
  padding: 10px;
  background: #5865f2;
  border: none;
  color: white;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #4752c4;
}

.friend {
  padding: 8px;
  background: #40444b;
  margin: 5px 0;
  border-radius: 5px;
  animation: slideIn 0.3s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px);}
  to { opacity: 1; transform: translateY(0);}
}

@keyframes slideIn {
  from { transform: translateX(-20px); opacity: 0;}
  to { transform: translateX(0); opacity: 1;}
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>Arkadaşlar</h2>
  <div id="friends"></div>

  <input id="friendInput" placeholder="Arkadaş ekle">
  <button onclick="addFriend()">Ekle</button>
</div>

<div class="chat">
  <div class="topbar">Mini Discord</div>

  <div id="messages" class="messages"></div>

  <input id="messageInput" placeholder="Mesaj yaz..." onkeydown="sendMessage(event)">
</div>

<script>
let username = prompt("Kullanıcı adın:");
if (!username) username = "Anonim";

function sendMessage(e) {
  if (e.key === "Enter") {
    const input = document.getElementById("messageInput");
    const msg = input.value;

    if (!msg) return;

    const div = document.createElement("div");
    div.classList.add("message");
    div.innerHTML = "<b>" + username + ":</b> " + msg;

    document.getElementById("messages").appendChild(div);

    input.value = "";
  }
}

function addFriend() {
  const input = document.getElementById("friendInput");
  const name = input.value;

  if (!name) return;

  const div = document.createElement("div");
  div.classList.add("friend");
  div.innerHTML = "❤️ " + name;

  document.getElementById("friends").appendChild(div);

  input.value = "";
}
</script>

</body>
</html>
